<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#073118" />
    <meta
      name="description"
      content="给哺乳期新手妈妈的营养与身体恢复轻量陪伴工具。"
    />
    <link rel="manifest" href="./manifest.json" />
    <link rel="icon" href="./icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./icon.svg" />
    <link rel="stylesheet" href="./styles.css" />
    <title>哺乳期营养地图</title>
  </head>
  <body>
    <div class="app-shell">
      <header class="hero">
        <p class="hero-kicker">产后哺乳期 · 新手妈妈 · 身体恢复中</p>
        <h1>哺乳期营养地图</h1>
        <p class="hero-copy">
          先帮你知道今天该怎么吃，再让你慢慢感觉到自己在一点点找回活力。
        </p>
      </header>

      <main id="app" class="app-main" aria-live="polite"></main>

      <nav class="tab-bar" aria-label="底部导航">
        <button class="tab-button" data-tab="current" type="button">
          <span class="tab-label">我的现在</span>
          <span class="tab-dot" aria-hidden="true"></span>
        </button>
        <button class="tab-button is-active" data-tab="state" type="button">
          <span class="tab-label">状态入口</span>
          <span class="tab-dot" aria-hidden="true"></span>
        </button>
        <button class="tab-button" data-tab="today" type="button">
          <span class="tab-label">今天怎么吃</span>
          <span class="tab-dot" aria-hidden="true"></span>
        </button>
        <button class="tab-button" data-tab="changes" type="button">
          <span class="tab-label">最近变化</span>
          <span class="tab-dot" aria-hidden="true"></span>
        </button>
        <button class="tab-button" data-tab="lookup" type="button">
          <span class="tab-label">缺什么查什么</span>
          <span class="tab-dot" aria-hidden="true"></span>
        </button>
        <button class="tab-button" data-tab="foods" type="button">
          <span class="tab-label">食物选择</span>
          <span class="tab-dot" aria-hidden="true"></span>
        </button>
      </nav>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./config.js"></script>
    <script src="./data.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
